---
layout: default
---

{{ content }}

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  document.querySelectorAll('pre code.language-mermaid').forEach(el => {
    const pre = el.parentElement;
    const newPre = document.createElement('pre');
    newPre.classList.add('mermaid');
    newPre.textContent = el.textContent;
    pre.replaceWith(newPre);
  });
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    flowchart: {
      curve: 'basis',
      nodeSpacing: 48,
      rankSpacing: 56,
      padding: 16,
      useMaxWidth: false,
    },
    themeVariables: {
      primaryColor: '#DBEAFE',
      primaryTextColor: '#1e3a5f',
      primaryBorderColor: '#3B82F6',
      lineColor: '#3B82F6',
      secondaryColor: '#EFF6FF',
      tertiaryColor: '#F0F9FF',
      background: '#ffffff',
      fontFamily: 'Inter, -apple-system, "Noto Sans KR", sans-serif',
      fontSize: '14px',
      edgeLabelBackground: '#EFF6FF',
      clusterBkg: '#EFF6FF',
      clusterBorder: '#BFDBFE',
      titleColor: '#1e3a5f',
      nodeTextColor: '#1e3a5f',
    }
  });
  await mermaid.run();
</script>
