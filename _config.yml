title: "SAP MM 공부 노트"
description: "SAP Materials Management 모듈 학습 일지 - 하루 30분씩"
url: "https://jhmin1993.github.io"
baseurl: "/mm"
repository: "jhmin1993/mm"
author:
  name: "jhmin1993"

remote_theme: pages-themes/primer@v0.6.0
lang: ko
timezone: Asia/Seoul

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

collections_dir: docs

collections:
  process:
    output: true
    permalink: /process/:path/
  master-data:
    output: true
    permalink: /master-data/:path/
  purchasing:
    output: true
    permalink: /purchasing/:path/
  inventory:
    output: true
    permalink: /inventory/:path/
  invoice:
    output: true
    permalink: /invoice/:path/
  config-guide:
    output: true
    permalink: /config-guide/:path/
  enterprise-structure:
    output: true
    permalink: /enterprise-structure/:path/
  glossary:
    output: true
    permalink: /glossary/:path/
  purchasing-scenarios:
    output: true
    permalink: /purchasing-scenarios/:path/

defaults:
  - scope: { path: "docs/_posts", type: "posts" }
    values: { layout: "post", author: "jhmin1993" }
  - scope: { path: "index.md" }
    values: { layout: "default" }
  - scope: { type: "process"      }
    values: { layout: "page" }
  - scope: { type: "master-data"  }
    values: { layout: "page" }
  - scope: { type: "purchasing"   }
    values: { layout: "page" }
  - scope: { type: "inventory"    }
    values: { layout: "page" }
  - scope: { type: "invoice"      }
    values: { layout: "page" }
  - scope: { type: "config-guide" }
    values: { layout: "page" }
  - scope: { type: "enterprise-structure" }
    values: { layout: "page" }
  - scope: { type: "glossary" }
    values: { layout: "page" }
  - scope: { type: "purchasing-scenarios" }
    values: { layout: "page" }

future: true
permalink: pretty

markdown: kramdown
kramdown:
  input: GFM
highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - vendor/
  - .claude/
  - CLAUDE.md
